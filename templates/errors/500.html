<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ошибка сервера</title>
    <style>
        :root {
            --bg: #f3f7fb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #0f766e;
        }
        body {
            margin: 0;
            font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .card {
            width: min(560px, 100%);
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 10px 35px rgba(15, 118, 110, 0.12);
            padding: 28px;
        }
        h1 {
            margin: 0 0 12px;
            font-size: 30px;
            line-height: 1.2;
        }
        p {
            margin: 8px 0;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.5;
        }
        .request-id {
            margin-top: 14px;
            padding: 10px 12px;
            background: #eef6f5;
            border-radius: 10px;
            color: #0b5e57;
            font-size: 14px;
        }
        a {
            display: inline-block;
            margin-top: 18px;
            text-decoration: none;
            color: white;
            background: var(--accent);
            border-radius: 10px;
            padding: 10px 14px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Внутренняя ошибка сервера</h1>
        <p>Мы уже сохранили детали ошибки. Попробуйте обновить страницу через несколько секунд.</p>
        {% if request_id %}
        <p class="request-id">ID ошибки: {{ request_id }}</p>
        {% endif %}
        <a href="/">На главную</a>
    </main>
</body>
</html>
