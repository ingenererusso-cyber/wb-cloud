<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доступ ограничен — Vendra</title>
    <style>
        body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f4f7fb;font-family:"Trebuchet MS","Segoe UI",sans-serif}
        .card{width:min(640px,calc(100% - 24px));border:1px solid #dbe3ec;border-radius:14px;background:#fff;padding:18px}
        .note{border:1px solid #fde68a;background:#fefce8;color:#92400e;padding:10px 12px;border-radius:10px}
        a{display:inline-block;margin-top:12px;text-decoration:none;border:1px solid #dbe3ec;border-radius:10px;padding:10px 14px;color:#0f172a;font-weight:700;background:#fff}
    </style>
</head>
<body>
<main class="card">
    <h1>Бесплатный полный доступ завершён</h1>
    <div class="note">
        Чтобы продолжить работу в сервисе, выберите тариф и продлите доступ.
        Интеграция реальной оплаты находится в разработке (заглушка под Т-Кассу).
    </div>
    {% if subscription %}
    <p>Текущий статус: <strong>{{ subscription.status_label }}</strong></p>
    {% endif %}
    <a href="{% url 'pricing_page' %}">Перейти к тарифам</a>
</main>
</body>
</html>
