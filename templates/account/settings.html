<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки аккаунта</title>
    <style>
        :root {
            --ink: #132033;
            --muted: #5a6778;
            --line: rgba(19, 32, 51, 0.14);
            --surface: rgba(255, 255, 255, 0.88);
            --ok-bg: #dcfce7;
            --ok-ink: #166534;
            --accent: #14532d;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Trebuchet MS", "Avenir Next", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 12% 18%, rgba(85, 215, 166, 0.45), transparent 30%),
                radial-gradient(circle at 82% 8%, rgba(136, 195, 255, 0.38), transparent 28%),
                linear-gradient(135deg, #eff7ff 0%, #f7fdf5 55%, #eef6ff 100%);
            display: grid;
            place-items: center;
            padding: 18px;
        }

        .card {
            width: min(760px, 100%);
            border: 1px solid var(--line);
            border-radius: 20px;
            background: var(--surface);
            padding: 22px 20px;
        }

        .head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        h1 {
            margin: 0;
            font-size: 28px;
        }

        .muted {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 14px;
        }

        .ok {
            margin-top: 12px;
            border-radius: 10px;
            padding: 10px 12px;
            background: var(--ok-bg);
            color: var(--ok-ink);
            font-size: 14px;
        }

        .field {
            margin-top: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
        }

        input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
        }

        .actions {
            margin-top: 14px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            border: 1px solid var(--line);
            background: #fff;
            color: var(--ink);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-primary {
            border-color: var(--accent);
            background: var(--accent);
            color: #fff;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="head">
            <h1>Настройки аккаунта</h1>
            <a class="btn" href="{% url 'home' %}">На главную</a>
        </div>
        <p class="muted">Пользователь: {{ request.user.username }}</p>
        <p class="muted">Кабинет продавца: {{ seller.name }}</p>

        {% if saved %}
            <div class="ok">API-ключ сохранён.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="field">
                <label for="api_token">API-ключ Wildberries</label>
                <input id="api_token" name="api_token" type="text" value="{{ seller.api_token }}" placeholder="Вставьте API-ключ">
            </div>
            <div class="actions">
                <button class="btn btn-primary" type="submit">Сохранить</button>
            </div>
        </form>
        <form method="post" action="{% url 'logout' %}" class="actions">
            {% csrf_token %}
            <button class="btn" type="submit">Выйти</button>
        </form>
    </main>
</body>
</html>
