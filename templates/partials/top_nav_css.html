<style>
    body {
        margin: 0 !important;
        padding: 12px 20px 28px !important;
    }

    .nav-shell {
        --nav-line: #dbe3ec;
        --nav-ink: #1f2a37;
        --nav-muted: #6b7280;
        --nav-accent: #147a59;
        --nav-accent-2: #0e9f6e;
        width: 100%;
        max-width: 1480px;
        margin: 0 auto 12px;
        border: 1px solid var(--nav-line);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 10px 22px rgba(19, 39, 60, 0.1);
        position: relative;
        z-index: 200;
    }

    .wb-nav {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        min-height: 58px;
        font-family: "Inter", "Segoe UI", sans-serif;
        flex-wrap: nowrap;
        overflow: visible;
        scrollbar-width: thin;
    }

    .nav-spacer {
        flex: 1 1 auto;
    }

    .home-link {
        display: inline-flex;
        align-items: center;
        text-decoration: none;
        color: var(--nav-ink);
        border: 1px solid var(--nav-line);
        border-radius: 10px;
        padding: 6px 10px;
        background: #fff;
        white-space: nowrap;
        transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease, background-color .16s ease;
    }

    .home-logo-img {
        display: block;
        height: 28px;
        width: auto;
    }

    .menu-item {
        position: relative;
        padding-bottom: 8px;
        margin-bottom: -8px;
    }

    .menu-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        text-decoration: none;
        color: var(--nav-ink);
        font-size: 14px;
        font-weight: 700;
        border: 1px solid transparent;
        border-radius: 10px;
        padding: 8px 12px;
        white-space: nowrap;
        transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease, background-color .16s ease;
    }

    .home-link:hover,
    .home-link:focus-visible {
        transform: translateY(-1px);
        box-shadow: 0 8px 16px rgba(19, 39, 60, 0.12);
    }

    .menu-link:hover,
    .menu-item:hover > .menu-link,
    .menu-item:focus-within > .menu-link {
        border-color: var(--nav-line);
        background: #fff;
        transform: translateY(-1px);
        box-shadow: 0 8px 16px rgba(19, 39, 60, 0.12);
    }

    .mega {
        display: none;
        position: absolute;
        left: 0;
        top: 100%;
        min-width: 700px;
        background: #fff;
        border: 1px solid var(--nav-line);
        border-radius: 14px;
        box-shadow: 0 14px 26px rgba(19, 39, 60, 0.14);
        padding: 14px 16px;
        z-index: 30;
    }

    .menu-item:hover .mega,
    .menu-item:focus-within .mega {
        display: block;
    }

    .mega-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(170px, 1fr));
        gap: 16px;
    }

    .mega-col h4 {
        margin: 0 0 8px;
        font-size: 14px;
        color: var(--nav-ink);
    }

    .mega-col a {
        display: block;
        text-decoration: none;
        color: #1f2a37;
        font-size: 14px;
        padding: 8px 10px;
        border-radius: 9px;
        border: 1px solid transparent;
        transition: background-color .15s ease, border-color .15s ease, color .15s ease;
    }

    .mega-col a:hover {
        color: #065f46;
        background: rgba(6, 95, 70, 0.1);
        border-color: rgba(6, 95, 70, 0.22);
    }

    .sync-control {
        display: inline-flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 3px;
        min-width: 236px;
        flex: 0 0 auto;
    }

    .sync-control .btn {
        width: 220px;
        min-width: 220px;
        height: 38px;
        white-space: nowrap;
        line-height: 1;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .sync-meta {
        font-size: 11px;
        color: var(--nav-muted);
        white-space: nowrap;
    }

    .account-menu {
        position: relative;
        flex: 0 0 auto;
        padding-bottom: 8px;
        margin-bottom: -8px;
    }

    .account-menu-trigger {
        font-size: 13px;
        color: var(--nav-muted);
        border: 1px solid var(--nav-line);
        background: rgba(255, 255, 255, 0.92);
        border-radius: 10px;
        padding: 8px 10px;
        white-space: nowrap;
        cursor: pointer;
    }

    .account-menu-trigger::after {
        content: "▾";
        margin-left: 6px;
        font-size: 11px;
        color: #64748b;
    }

    .account-menu:hover .account-menu-trigger,
    .account-menu:focus-within .account-menu-trigger {
        border-color: #cbd5e1;
        box-shadow: 0 8px 16px rgba(19, 39, 60, 0.12);
    }

    .account-menu-dropdown {
        position: absolute;
        top: 100%;
        right: 0;
        min-width: 170px;
        padding: 6px;
        border: 1px solid var(--nav-line);
        border-radius: 10px;
        background: #fff;
        box-shadow: 0 14px 24px rgba(19, 39, 60, 0.14);
        display: none;
        z-index: 40;
    }

    .account-menu:hover .account-menu-dropdown,
    .account-menu:focus-within .account-menu-dropdown {
        display: block;
    }

    .account-menu-item {
        display: block;
        width: 100%;
        text-decoration: none;
        color: var(--nav-ink);
        font-size: 13px;
        font-weight: 600;
        border: 1px solid transparent;
        border-radius: 8px;
        background: transparent;
        padding: 8px 9px;
        text-align: left;
    }

    .account-menu-item:hover,
    .account-menu-item:focus-visible {
        background: rgba(6, 95, 70, 0.08);
        border-color: rgba(6, 95, 70, 0.2);
        color: #065f46;
    }

    .account-menu-item-btn {
        cursor: pointer;
    }

    .feedback-inline {
        display: inline-flex;
        align-items: center;
    }

    .nav-shell .btn {
        text-decoration: none;
        color: #fff;
        background: linear-gradient(135deg, var(--nav-accent) 0%, var(--nav-accent-2) 100%);
        border-radius: 10px;
        padding: 8px 10px;
        font-weight: 700;
        border: none;
        cursor: pointer;
        font-size: 13px;
        min-width: 220px;
        flex: 0 0 auto;
        box-shadow: none;
        transition: transform .16s ease, box-shadow .16s ease, filter .16s ease, background-color .16s ease, border-color .16s ease;
    }

    .nav-shell .btn-ghost {
        border: 1px solid var(--nav-line);
        background: rgba(255, 255, 255, 0.85);
        color: var(--nav-ink);
        box-shadow: none;
        min-width: auto;
    }

    .nav-shell .btn:hover,
    .nav-shell .btn:focus-visible {
        transform: translateY(-1px);
        box-shadow: 0 10px 20px rgba(19, 39, 60, 0.16);
        filter: saturate(1.04);
    }

    .nav-shell .btn.sync-busy {
        --sync-progress: 0%;
        color: #ffffff;
        border: 1px solid #7fb89d;
        font-weight: 800;
        letter-spacing: 0.01em;
        text-shadow: 0 1px 1px rgba(0, 0, 0, 0.24);
        background: linear-gradient(
            90deg,
            #22a06b 0%,
            #22a06b var(--sync-progress),
            #e5e7eb var(--sync-progress),
            #e5e7eb 100%
        );
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.25);
        animation: sync-busy-pulse 1.25s ease-in-out infinite;
    }

    @keyframes sync-busy-pulse {
        0%, 100% {
            box-shadow:
                inset 0 0 0 1px rgba(255, 255, 255, 0.25),
                0 0 0 0 rgba(34, 160, 107, 0.22);
        }
        50% {
            box-shadow:
                inset 0 0 0 1px rgba(255, 255, 255, 0.28),
                0 0 0 6px rgba(34, 160, 107, 0.1);
        }
    }

    @media (max-width: 900px) {
        body {
            padding: 10px 12px 20px !important;
        }

        .wb-nav {
            min-height: auto;
            overflow-x: auto;
            overflow-y: visible;
        }

        .mega {
            min-width: 280px;
            max-width: min(90vw, 420px);
        }

        .mega-grid {
            grid-template-columns: 1fr;
        }
    }

    .feedback-modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1200;
        background: rgba(19, 32, 51, 0.46);
        padding: 16px;
    }

    .feedback-modal.open {
        display: flex;
    }

    .feedback-card {
        width: min(680px, 100%);
        max-height: 90vh;
        overflow: auto;
        border: 1px solid var(--nav-line);
        border-radius: 14px;
        background: #fff;
        box-shadow: 0 14px 28px rgba(19, 39, 60, 0.18);
        padding: 16px;
    }

    .feedback-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 10px;
    }

    .feedback-head h3 {
        margin: 0;
        font-size: 20px;
        color: var(--nav-ink);
    }

    .feedback-close {
        border: 1px solid var(--nav-line);
        background: #fff;
        color: var(--nav-ink);
        border-radius: 9px;
        padding: 6px 10px;
        font-size: 13px;
        cursor: pointer;
    }

    .feedback-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }

    .feedback-field {
        display: grid;
        gap: 5px;
    }

    .feedback-field.full {
        grid-column: 1 / -1;
    }

    .feedback-field label {
        font-size: 12px;
        color: var(--nav-muted);
    }

    .feedback-field select,
    .feedback-field textarea,
    .feedback-field input[type="text"] {
        width: 100%;
        border: 1px solid var(--nav-line);
        border-radius: 10px;
        padding: 9px 11px;
        font-size: 14px;
        color: var(--nav-ink);
        background: #fff;
    }

    .feedback-field textarea {
        min-height: 130px;
        resize: vertical;
    }

    .feedback-toggle {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--nav-ink);
    }

    .feedback-footer {
        margin-top: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        flex-wrap: wrap;
    }

    .feedback-note {
        font-size: 12px;
        color: var(--nav-muted);
    }

    .feedback-status {
        margin-top: 9px;
        font-size: 13px;
        border-radius: 8px;
        padding: 8px 10px;
        display: none;
    }

    .feedback-status.show {
        display: block;
    }

    .feedback-status.ok {
        border: 1px solid #bbf7d0;
        background: #dcfce7;
        color: #166534;
    }

    .feedback-status.error {
        border: 1px solid #fecaca;
        background: #fee2e2;
        color: #991b1b;
    }

    .nav-loading-overlay {
        position: fixed;
        inset: 0;
        z-index: 2000;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(15, 23, 42, 0.34);
        backdrop-filter: blur(1.5px);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: opacity .16s ease, visibility .16s ease;
    }

    body.nav-loading .nav-loading-overlay {
        opacity: 1;
        visibility: visible;
        pointer-events: all;
    }

    .nav-loading-box {
        min-width: 240px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid #cbd5e1;
        background: #ffffff;
        color: #0f172a;
        box-shadow: 0 14px 28px rgba(2, 6, 23, 0.2);
        font-size: 13px;
        font-weight: 600;
    }

    .nav-loading-spinner {
        width: 18px;
        height: 18px;
        border-radius: 999px;
        border: 2px solid #dbe3ec;
        border-top-color: #147a59;
        animation: nav-loader-spin .75s linear infinite;
    }

    @keyframes nav-loader-spin {
        to {
            transform: rotate(360deg);
        }
    }
</style>
