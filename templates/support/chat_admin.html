<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Администрирование · Чат с поддержкой</title>
    {% include "partials/top_nav_css.html" %}
    <style>
        :root { --bg:#edf3f7; --card:#fff; --line:#dbe3ec; --text:#1f2a37; --muted:#6b7280; }
        body { margin:0; padding:12px 20px 28px !important; font-family:"Inter","Segoe UI",sans-serif; background:radial-gradient(circle at top left,#d8efe6 0%,#dfe9f5 45%,var(--bg) 100%); color:var(--text); }
        .page-wrap { max-width:1480px; margin:0 auto; border:1px solid var(--line); border-radius:16px; background:var(--card); overflow:hidden; height:calc(100vh - 115px); min-height:640px; display:grid; grid-template-columns:380px 1fr; }
        .side { border-right:1px solid var(--line); display:flex; flex-direction:column; min-width:0; }
        .head { padding:12px; border-bottom:1px solid var(--line); display:grid; gap:8px; }
        .head h3 { margin:0; font-size:18px; }
        .filters { display:grid; grid-template-columns:1fr 130px; gap:8px; }
        .filters input,.filters select { border:1px solid var(--line); border-radius:9px; padding:8px 10px; font-size:13px; }
        .thread-list { padding:8px; overflow:auto; display:grid; gap:8px; }
        .thread-card { border:1px solid #e2e8f0; border-radius:12px; padding:9px; cursor:pointer; background:#fff; }
        .thread-card.active { border-color:#93c5fd; background:#eff6ff; }
        .thread-top { display:flex; align-items:center; justify-content:space-between; gap:8px; }
        .thread-subject { font-size:14px; font-weight:700; margin:0; }
        .thread-owner { font-size:12px; color:#334155; margin-top:4px; }
        .thread-meta { color:var(--muted); font-size:12px; margin-top:4px; }
        .thread-preview { color:#475569; font-size:12px; margin-top:6px; }
        .badge { min-width:20px; height:20px; border-radius:999px; background:#dc2626; color:#fff; font-size:11px; font-weight:700; display:inline-flex; align-items:center; justify-content:center; padding:0 6px; }
        .status { display:inline-flex; align-items:center; border-radius:999px; padding:2px 8px; font-size:11px; font-weight:700; border:1px solid #cbd5e1; color:#334155; background:#f8fafc; }
        .status.info { border-color:#bfdbfe; background:#eff6ff; color:#1d4ed8; }
        .status.warn { border-color:#fde68a; background:#fefce8; color:#b45309; }
        .status.muted { border-color:#e5e7eb; background:#f9fafb; color:#6b7280; }
        .main { display:flex; flex-direction:column; min-width:0; }
        .chat-head { border-bottom:1px solid var(--line); padding:12px; display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
        .chat-head h3 { margin:0; font-size:17px; }
        .chat-head-right { display:flex; gap:8px; align-items:center; }
        .chat-head select { border:1px solid var(--line); border-radius:9px; padding:7px 9px; font-size:13px; }
        .chat-feed { flex:1; overflow:auto; padding:14px; display:grid; gap:10px; align-content:start; background:#f8fbff; }
        .msg { max-width:min(760px, 90%); border-radius:14px; padding:9px 11px; border:1px solid #dbe7f4; background:#fff; }
        .msg.mine { margin-left:auto; background:#e8fff5; border-color:#b7f0d4; }
        .msg.internal { border-style:dashed; background:#fff7ed; border-color:#fed7aa; }
        .msg-meta { color:var(--muted); font-size:11px; margin-top:4px; }
        .chat-form { border-top:1px solid var(--line); padding:10px; display:grid; gap:8px; }
        .chat-form textarea { width:100%; border:1px solid var(--line); border-radius:10px; min-height:44px; max-height:140px; resize:vertical; padding:9px 11px; font-family:inherit; }
        .chat-form-row { display:flex; align-items:center; justify-content:space-between; gap:8px; }
        .btn { border:0; background:linear-gradient(135deg,#147a59 0%,#0e9f6e 100%); color:#fff; border-radius:10px; padding:8px 12px; font-weight:700; cursor:pointer; }
        .btn-ghost { border:1px solid var(--line); background:#fff; color:#334155; }
        .empty { margin:auto; text-align:center; color:var(--muted); font-size:14px; padding:16px; }
        @media (max-width: 980px) {
            .page-wrap { grid-template-columns:1fr; height:auto; min-height:calc(100vh - 115px); }
            .side { border-right:0; border-bottom:1px solid var(--line); max-height:46vh; }
        }
    </style>
</head>
<body>
    {% include "partials/top_nav.html" %}
    <div class="page-wrap">
        <aside class="side">
            <div class="head">
                <h3>Все обращения</h3>
                <div class="filters">
                    <input type="text" id="filter-query" placeholder="Поиск по user / теме">
                    <select id="filter-status">
                        <option value="">Все статусы</option>
                        <option value="open">Открыт</option>
                        <option value="waiting_support">Ждет поддержки</option>
                        <option value="waiting_user">Ждет пользователя</option>
                        <option value="closed">Закрыт</option>
                    </select>
                </div>
            </div>
            <div id="thread-list" class="thread-list"></div>
        </aside>
        <section class="main">
            <div class="chat-head">
                <h3 id="chat-title">Выберите диалог</h3>
                <div class="chat-head-right">
                    <span id="chat-status-badge" class="status">—</span>
                    <select id="chat-status-select" disabled>
                        <option value="open">Открыт</option>
                        <option value="waiting_support">Ждет поддержки</option>
                        <option value="waiting_user">Ждет пользователя</option>
                        <option value="closed">Закрыт</option>
                    </select>
                    <button class="btn btn-ghost" id="chat-status-save" type="button" disabled>Сохранить статус</button>
                </div>
            </div>
            <div id="chat-feed" class="chat-feed">
                <div class="empty">Выберите диалог слева</div>
            </div>
            <form id="chat-form" class="chat-form" data-no-nav-loader="1">
                <textarea id="chat-input" placeholder="Ответ поддержки..." disabled></textarea>
                <div class="chat-form-row">
                    <label><input id="chat-is-internal" type="checkbox"> Внутренняя заметка (не видна пользователю)</label>
                    <button class="btn" id="chat-send-btn" type="submit" disabled>Отправить</button>
                </div>
            </form>
        </section>
    </div>

    <script>
        (function supportAdminPage() {
            const listEl = document.getElementById("thread-list");
            const feedEl = document.getElementById("chat-feed");
            const titleEl = document.getElementById("chat-title");
            const statusBadgeEl = document.getElementById("chat-status-badge");
            const statusSelectEl = document.getElementById("chat-status-select");
            const statusSaveBtn = document.getElementById("chat-status-save");
            const inputEl = document.getElementById("chat-input");
            const sendBtn = document.getElementById("chat-send-btn");
            const isInternalEl = document.getElementById("chat-is-internal");
            const formEl = document.getElementById("chat-form");
            const qEl = document.getElementById("filter-query");
            const statusFilterEl = document.getElementById("filter-status");
            const state = { threads: [], activeThreadId: null };

            function getCookie(name) {
                const value = `; ${document.cookie}`;
                const parts = value.split(`; ${name}=`);
                if (parts.length === 2) return parts.pop().split(";").shift();
                return "";
            }
            function fmt(iso) {
                if (!iso) return "";
                const dt = new Date(iso);
                return dt.toLocaleString("ru-RU", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" });
            }
            function statusClass(color) {
                if (color === "info") return "status info";
                if (color === "warn") return "status warn";
                if (color === "muted") return "status muted";
                return "status";
            }
            async function loadThreads() {
                const params = new URLSearchParams();
                if (qEl.value.trim()) params.set("q", qEl.value.trim());
                if (statusFilterEl.value) params.set("status", statusFilterEl.value);
                const url = `{% url 'support_threads_api' %}?${params.toString()}`;
                const res = await fetch(url, { headers: { "Accept": "application/json" } });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Ошибка загрузки");
                state.threads = data.threads || [];
                renderThreads();
                if (!state.activeThreadId && state.threads.length) {
                    openThread(state.threads[0].id);
                }
            }
            function renderThreads() {
                if (!state.threads.length) {
                    listEl.innerHTML = '<div class="empty">Диалоги не найдены</div>';
                    return;
                }
                listEl.innerHTML = state.threads.map((t) => `
                    <article class="thread-card ${state.activeThreadId === t.id ? "active" : ""}" data-id="${t.id}">
                        <div class="thread-top">
                            <p class="thread-subject">${t.subject}</p>
                            ${t.unread_count > 0 ? `<span class="badge">${t.unread_count > 99 ? "99+" : t.unread_count}</span>` : ""}
                        </div>
                        <div class="thread-owner">Пользователь: ${t.owner.username}</div>
                        <div class="thread-meta">${fmt(t.updated_at)} · <span class="${statusClass(t.status.color)}">${t.status.label}</span></div>
                        <div class="thread-preview">${t.last_message_preview || ""}</div>
                    </article>
                `).join("");
            }
            async function openThread(threadId, opts = {}) {
                const skipThreadsReload = Boolean(opts.skipThreadsReload);
                state.activeThreadId = Number(threadId);
                renderThreads();
                const res = await fetch(`/api/support/threads/${threadId}/messages/`, { headers: { "Accept": "application/json" } });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Ошибка загрузки сообщений");
                const thread = data.thread;
                titleEl.textContent = `${thread.subject} · ${thread.owner.username}`;
                statusBadgeEl.className = statusClass(thread.status.color);
                statusBadgeEl.textContent = thread.status.label;
                statusSelectEl.value = thread.status.code;
                statusSelectEl.disabled = false;
                statusSaveBtn.disabled = false;
                inputEl.disabled = false;
                sendBtn.disabled = false;
                const messages = data.messages || [];
                feedEl.innerHTML = messages.length ? messages.map((m) => `
                    <article class="msg ${m.is_mine ? "mine" : ""} ${m.is_internal ? "internal" : ""}">
                        <div>${(m.body || "").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>")}</div>
                        <div class="msg-meta">${m.author_username} · ${fmt(m.created_at)} ${m.is_internal ? "· внутренняя заметка" : ""}</div>
                    </article>
                `).join("") : '<div class="empty">В этом диалоге пока нет сообщений</div>';
                feedEl.scrollTop = feedEl.scrollHeight;
                await fetch(`/api/support/threads/${threadId}/read/`, {
                    method: "POST",
                    headers: { "X-CSRFToken": getCookie("csrftoken"), "Accept": "application/json" },
                });
                if (!skipThreadsReload) {
                    await loadThreads();
                }
            }
            async function sendMessage() {
                if (!state.activeThreadId) return;
                const body = (inputEl.value || "").trim();
                if (!body) return;
                const fd = new FormData();
                fd.set("body", body);
                if (isInternalEl.checked) fd.set("is_internal", "1");
                const res = await fetch(`/api/support/threads/${state.activeThreadId}/messages/`, {
                    method: "POST",
                    headers: { "X-CSRFToken": getCookie("csrftoken"), "Accept": "application/json" },
                    body: fd,
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Ошибка отправки");
                inputEl.value = "";
                isInternalEl.checked = false;
                await openThread(state.activeThreadId);
            }
            async function saveStatus() {
                if (!state.activeThreadId) return;
                const fd = new FormData();
                fd.set("status", statusSelectEl.value);
                const res = await fetch(`/api/support/threads/${state.activeThreadId}/status/`, {
                    method: "POST",
                    headers: { "X-CSRFToken": getCookie("csrftoken"), "Accept": "application/json" },
                    body: fd,
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Не удалось сохранить статус");
                await openThread(state.activeThreadId);
            }

            listEl.addEventListener("click", (e) => {
                const card = e.target.closest(".thread-card");
                if (!card) return;
                openThread(card.dataset.id).catch((err) => alert(String(err)));
            });
            formEl.addEventListener("submit", async (e) => {
                e.preventDefault();
                try { await sendMessage(); } catch (err) { alert(String(err)); }
            });
            inputEl.addEventListener("keydown", (event) => {
                if (event.key === "Enter" && !event.shiftKey) {
                    event.preventDefault();
                    formEl.requestSubmit();
                }
            });
            statusSaveBtn.addEventListener("click", async () => {
                try { await saveStatus(); } catch (err) { alert(String(err)); }
            });

            let filterTimer = null;
            function scheduleReload() {
                if (filterTimer) window.clearTimeout(filterTimer);
                filterTimer = window.setTimeout(() => loadThreads().catch(() => {}), 250);
            }
            qEl.addEventListener("input", scheduleReload);
            statusFilterEl.addEventListener("change", scheduleReload);

            loadThreads().catch((err) => {
                listEl.innerHTML = `<div class="empty">${String(err)}</div>`;
            });
            window.setInterval(() => {
                if (document.hidden) return;
                if (state.activeThreadId) {
                    openThread(state.activeThreadId, { skipThreadsReload: true }).catch(() => {});
                    loadThreads().catch(() => {});
                    return;
                }
                loadThreads().catch(() => {});
            }, 20000);
        })();
    </script>
</body>
</html>
