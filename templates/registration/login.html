<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в MP SaaS</title>
    <style>
        :root {
            --ink: #132033;
            --muted: #5a6778;
            --line: rgba(19, 32, 51, 0.14);
            --surface: rgba(255, 255, 255, 0.9);
            --accent: #14532d;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Trebuchet MS", "Avenir Next", "Segoe UI", sans-serif;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 18% 20%, rgba(85, 215, 166, 0.45), transparent 28%),
                radial-gradient(circle at 84% 10%, rgba(136, 195, 255, 0.36), transparent 26%),
                linear-gradient(135deg, #eff7ff 0%, #f7fdf5 55%, #eef6ff 100%);
            padding: 16px;
            color: var(--ink);
        }

        .card {
            width: min(420px, 100%);
            border: 1px solid var(--line);
            background: var(--surface);
            border-radius: 16px;
            padding: 24px 20px;
        }

        h1 {
            margin: 0 0 6px;
            font-size: 28px;
        }

        p {
            margin: 0 0 16px;
            color: var(--muted);
            font-size: 14px;
        }

        label {
            display: block;
            margin: 10px 0 6px;
            font-size: 14px;
        }

        input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
        }

        .btn {
            margin-top: 14px;
            width: 100%;
            border: none;
            border-radius: 10px;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            padding: 11px 12px;
            cursor: pointer;
            transition: transform .16s ease, box-shadow .16s ease, filter .16s ease;
        }

        .btn:hover,
        .btn:focus-visible {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(20, 83, 45, 0.28);
            filter: saturate(1.04);
        }

        .error {
            margin: 0 0 10px;
            padding: 8px 10px;
            border-radius: 8px;
            background: #fee2e2;
            color: #991b1b;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>MP SaaS</h1>
        <p>Войдите, чтобы открыть ваши отчёты и графики.</p>

        {% if form.errors %}
            <div class="error">Неверный логин или пароль.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <label for="id_username">Логин или e-mail</label>
            <input id="id_username" type="text" name="username" required autofocus>

            <label for="id_password">Пароль</label>
            <input id="id_password" type="password" name="password" required>

            <button class="btn" type="submit">Войти</button>
            <input type="hidden" name="next" value="{{ next|default:'/' }}">
        </form>
        <p style="margin-top:12px;">
            Нет аккаунта? <a href="{% url 'home' %}#signup">Начать 3 дня бесплатно</a>
        </p>
    </main>
</body>
</html>
